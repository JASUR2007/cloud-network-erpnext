name: Deploy to EC2

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            REPO_DIR="/home/ubuntu/cloud-network-erpnext"

            cd "$REPO_DIR"

            echo "=== Pulling latest changes ==="
            git pull origin main

            echo "=== Rebuilding containers ==="
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            echo "=== Waiting for ERPNext to be ready ==="
            for i in $(seq 1 36); do
              if curl -sf http://localhost/api/method/frappe.ping > /dev/null 2>&1; then
                echo "ERPNext is ready!"
                break
              fi
              echo "Waiting... ($i/36)"
              sleep 5
            done

            echo "=== Building assets ==="
            docker compose exec -T erpnext bench build

            echo "=== Running migrations ==="
            docker compose exec -T erpnext bench migrate

            echo "=== Clearing cache ==="
            docker compose exec -T erpnext bench clear-cache
            docker compose exec -T erpnext bench clear-website-cache

            echo "=== Final status ==="
            docker compose ps

            echo "=== Deployment complete ==="