name: Deploy to EC2

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            REPO_DIR="/home/ubuntu/cloud-network-erpnext"

            cd "$REPO_DIR"

            echo "=== Pulling latest changes ==="
            git pull origin main

            echo "=== Rebuilding containers ==="
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            echo "=== Waiting for startup ==="
            sleep 60

            echo "=== Clearing ERPNext cache ==="
            docker compose exec -T erpnext bench clear-cache || true
            docker compose exec -T erpnext bench clear-website-cache || true

            echo "=== Running migrations ==="
            docker compose exec -T erpnext bench migrate || true

            echo "=== Restart ERPNext ==="
            docker compose restart erpnext

            echo "=== Final status ==="
            docker compose ps

            echo "=== ERPNext logs ==="
            docker compose logs --tail=50 erpnext

            echo "=== Deployment complete ==="