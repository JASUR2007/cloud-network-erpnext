name: Deploy to EC2

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 60m
          script: |
            set -e

            REPO_DIR="/home/ubuntu/cloud-network-erpnext"

            cd "$REPO_DIR"

            echo "=== Pulling latest changes ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Rebuilding containers ==="
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            echo "=== Waiting for ERPNext container health ==="
            for i in $(seq 1 60); do
              STATUS=$(docker inspect erpnext-crm-erpnext-1 --format='{{.State.Health.Status}}' 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "ERPNext is healthy!"
                break
              fi
              echo "Waiting... ($i/60) status=$STATUS"
              sleep 10
            done

            echo "=== Running migrations ==="
            docker compose exec -T erpnext bench migrate

            echo "=== Building assets ==="
            docker compose exec -T erpnext bench build

            echo "=== Clearing cache ==="
            docker compose exec -T erpnext bench clear-cache
            docker compose exec -T erpnext bench clear-website-cache

            echo "=== Final status ==="
            docker compose ps

            echo "=== Deployment complete ==="
