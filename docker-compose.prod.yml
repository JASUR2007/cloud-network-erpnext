name: clothing-system

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./erpnext/public/crm:/usr/share/nginx/html/crm:ro
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    depends_on:
      erpnext:
        condition: service_started
    restart: unless-stopped
    networks:
      - clothing-network

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - clothing-network

  duckdns:
    image: linuxserver/duckdns:latest
    environment:
      - SUBDOMAINS=clothing-jasur
      - TOKEN=<YOUR_DUCKDNS_TOKEN>
      - LOG_FILE=/config/duckdns.log
    volumes:
      - duckdns-data:/config
    restart: unless-stopped
    networks:
      - clothing-network

  db:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --max-allowed-packet=256M
    environment:
      MYSQL_ROOT_PASSWORD: erpnext
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-perpnext"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - clothing-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - clothing-network

  erpnext:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis
      REDIS_QUEUE: redis
      REDIS_SOCKETIO: redis
      SITE_NAME: clothing-jasur.duckdns.org
      DB_PASSWORD: erpnext
      ADMIN_PASSWORD: admin
    volumes:
      - sites-vol:/home/frappe/frappe-bench/sites
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - clothing-network

  backup:
    image: mariadb:10.6
    volumes:
      - ./backups:/backups
      - ./deploy/scripts/backup-db.sh:/backup-db.sh:ro
    entrypoint: |
      sh -c '
        apt-get update -qq && apt-get install -y -qq awscli >/dev/null 2>&1
        echo "0 3 * * * root bash /backup-db.sh >> /var/log/backup.log 2>&1" > /etc/cron.d/db-backup
        cron -f
      '
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_PASSWORD: erpnext
      BACKUP_DIR: /backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - clothing-network

volumes:
  db-data:
  sites-vol:
  certbot-www:
  certbot-certs:
  duckdns-data:

networks:
  clothing-network:
    driver: bridge
