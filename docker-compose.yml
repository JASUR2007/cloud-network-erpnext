name: erpnext-crm

services:
  crm-demo:
    build:
      context: .
      dockerfile: deploy/Dockerfile.crm-demo
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --max-allowed-packet=256M
    environment:
      MYSQL_ROOT_PASSWORD: erpnext
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-perpnext"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "8088:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  erpnext:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis
      REDIS_QUEUE: redis
      SITE_NAME: erpnext.local
      DB_PASSWORD: erpnext
      ADMIN_PASSWORD: admin
    ports:
      - "80:8000"
    volumes:
      - sites-vol:/home/frappe/frappe-bench/sites
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
  sites-vol:
